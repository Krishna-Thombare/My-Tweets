{% extends "layout.html" %}
{% load static %}

{% block title %}
Delete Tweet
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'tweet/css/tweet_form.css' %}">
{% endblock %}

{% block content %}

<div class="tweet-form-page">
    <div class="tweet-form-card">

        <h2 class="tweet-form-title">Delete this tweet?</h2>

        <p class="delete-confirm-text">This action cannot be undone.</p>

        <form method="POST">
            {% csrf_token %}
            <div class="tweet-form-actions">
                <button class="tweet-form-submit delete-confirm-btn" type="submit">Delete</button>
                {% if not embed %}
                    <a href="{% url 'tweet_list' %}" class="tweet-form-back">Cancel</a>
                {% endif %}
            </div>
        </form>

    </div>
</div>

{% endblock %}
