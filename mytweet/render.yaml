services:
  - type: web
    name: mytweets
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn mytweet.wsgi:application"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: PYTHONIOENCODING
        value: utf-8
      - key: DATABASE_URL
        fromDatabase:
          name: mytweets-db
          property: connectionString